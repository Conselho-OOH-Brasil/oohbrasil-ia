.rank-text{flex:1}
.rank-t{font-size:12px;font-weight:800;color:#fff;line-height:1.3;text-transform:uppercase;letter-spacing:.03em}
.rank-d{font-size:10px;color:var(--w70);margin-top:2px;line-height:1.4}

.cultura-grid{display:grid;gap:.75rem;margin-bottom:1rem}

textarea{width:100%;border:2px solid rgba(255,255,255,.25);border-radius:8px;padding:11px 14px;font-size:13px;font-family:inherit;color:#fff;background:rgba(255,255,255,.08);resize:vertical;min-height:100px;outline:none;line-height:1.7}

.faixa-next{background:rgba(0,0,0,.2);border-radius:10px;padding:.85rem 1rem;font-size:12px;line-height:1.6;color:rgba(255,255,255,.8);text-align:left}
.faixa-next strong{color:#fff;font-weight:700;display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
.fb-branca{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.4)}
.fb-branca .faixa-nome-big{color:#fff}
.fb-amarela{background:rgba(255,233,0,.1);border-color:#FFE900}
.fb-amarela .faixa-nome-big{color:#FFE900}
.fb-verde{background:rgba(68,214,44,.1);border-color:#44D62C}
.fb-verde .faixa-nome-big{color:#44D62C}
.fb-rosa{background:rgba(255,25,105,.1);border-color:#FF1969}

.fb-preta{background:#000;border-color:#000}

.res-box{background:#0847A8;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.res-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;color:var(--w70);padding:7px 0;border-bottom:1px solid rgba(255,255,255,.1);gap:1rem}
.res-row:last-child{border-bottom:none}
.res-v{font-weight:700;color:#fff;text-align:right;max-width:60%}
.chips{display:flex;flex-wrap:wrap;gap:.3rem;justify-content:flex-end}
.chip{font-size:10px;background:#FFE900;color:#0847A8;border-radius:20px;padding:3px 10px;font-weight:800}
.rank-chip{font-size:10px;background:rgba(255,233,0,.15);color:#FFE900;border-radius:20px;padding:3px 10px;font-weight:700;border:1px solid rgba(255,233,0,.3);display:inline-flex;align-items:center;gap:4px}
.rank-chip-n{background:#FFE900;color:#0847A8;border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0}
.sent-ok{background:rgba(68,214,44,.15);border:2px solid #44D62C;border-radius:10px;padding:1rem;font-size:13px;color:#44D62C;font-weight:700;text-align:center;margin-bottom:1rem}
.sent-err{background:rgba(255,25,105,.15);border:2px solid #FF1969;border-radius:10px;padding:1rem;font-size:12px;color:#FF1969;font-weight:700;text-align:center;margin-bottom:1rem}
.sending-msg{text-align:center;padding:1rem;font-size:13px;color:var(--w70);font-weight:600}
.footer{text-align:center;padding:2rem 0 1rem;border-top:1px solid rgba(255,255,255,.12);margin-top:2rem}
.footer img{height:24px;opacity:.4}
</style>
</head>

<div class="color-bar"><div class="cb1"></div><div class="cb2"></div><div class="cb3"></div><div class="cb4"></div><div class="cb5"></div></div>

<div class="header">

<script>

// Helpers
function tog(arr,val){const i=arr.indexOf(val);if(i>-1)arr.splice(i,1);else arr.push(val);}
function togP(nid,item){if(!st.profund[nid])st.profund[nid]=[];tog(st.profund[nid],item);}
function getDesc(dor){return(dor.desc[st.dept]||dor.desc["CEO"]||"");}
function addRank(id){const d=DORES.find(x=>x.id===id);if(d&&!st.ranking.find(r=>r.id===id))st.ranking.push(d);render();}
function remRank(id){st.ranking=st.ranking.filter(r=>r.id!==id);render();}

function calcFaixa(){
  const n=parseInt(st.nivel)||0;
  const f=FREQ.indexOf(st.freq);
  const n1=(st.profund.n1||[]).length;
  const n2=(st.profund.n2||[]).length;
  const n3=(st.profund.n3||[]).length;
  const n4=(st.profund.n4||[]).filter(x=>x!=="Nunca cheguei neste nível").length;
  const score=(n*2)+(f>=0?f:0)+Math.min(n1,3)+Math.min(n2*1.5,4)+Math.min(n3*2,5)+Math.min(n4*3,6);
  if(score<=3)return FAIXAS[0];
  if(score<=8)return FAIXAS[1];
  if(score<=14)return FAIXAS[2];
  if(score<=20)return FAIXAS[3];
  return FAIXAS[4];
}

function getBarrByFaixa(){
  const f=calcFaixa();
  if(f.id==="rosa"||f.id==="preta")return BARR_AVANCADO;
  if(f.id==="verde")return BARR_INTERMEDIARIO;
  return BARR_INICIANTE;
}

function barrasIcon(nivel,cor,corVazio){
  let h='<div class="faixa-barras-big">';
  for(let i=0;i<5;i++)h+=`<div class="faixa-barra-big" style="background:${i<nivel?cor:corVazio}"></div>`;
  return h+'</div>';
}

// Navegação
function setProgress(step){
  const pct=Math.round((Math.min(step,TOTAL_STEPS)/TOTAL_STEPS)*100);
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-etapa").textContent="Etapa "+Math.min(step,TOTAL_STEPS)+" de "+TOTAL_STEPS;
  const r=TOTAL_STEPS-Math.min(step,TOTAL_STEPS);
  document.getElementById("prog-falta").textContent=r<=0?"Concluído":r+(r===1?" etapa restante":" etapas restantes");
}

function goStep(n){
  st.step=n;
  setProgress(n);
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function validar(){
  const s=st.step;
  if(s===1)return st.nome.trim().length>1&&st.dept!=="";
  if(s===2)return st.autoaval!=="";
  if(s===3)return st.nivel!==""&&st.freq!=="";
  if(s===4)return Object.values(st.profund).flat().length>0;
  if(s===5)return st.ranking.length>0;
  if(s===6)return st.barreiras.length>0;
  if(s===7)return Object.keys(st.cultura).length===4&&st.ofertas.length>0;
  if(s===8)return st.comentario.trim().length>10;
  return true;
}

function erroMsg(){
  const s=st.step;
  if(s===1)return st.nome.trim().length<=1?"Informe seu nome para continuar.":"Selecione sua área para continuar.";
  if(s===2)return"Selecione como você avalia sua maturidade atual em IA.";
  if(s===3)return"Responda pelo menos o nível de uso e a frequência.";
  if(s===4)return"Selecione pelo menos uma atividade que você já realizou com IA.";
  if(s===5)return"Adicione pelo menos uma dor ao seu ranking.";
  if(s===6)return"Selecione pelo menos uma barreira.";
  if(s===7)return Object.keys(st.cultura).length<4?"Responda todas as 4 perguntas sobre o suporte da empresa.":"Selecione pelo menos uma opção do que você precisaria para avançar.";
  if(s===8)return"Descreva pelo menos uma coisa que gostaria de resolver com IA antes de finalizar.";
  return"";
}

function avancar(){
  const err=document.getElementById("val-err");
  if(err)err.remove();
  if(!validar()){
    const el=document.createElement("div");
    el.id="val-err";el.className="err-msg";el.textContent=erroMsg();
    document.querySelector(".nav").before(el);
    el.scrollIntoView({behavior:"smooth",block:"center"});
    setTimeout(()=>{if(el.parentNode)el.remove();},4000);
    return;
  }
  goStep(st.step+1);
}

function render(){
  const steps={1:s1,2:s2,3:s3,4:s4,5:s5,6:s6,7:s7,8:s8};
  const fn=steps[st.step];
  if(fn){
    document.getElementById("app").innerHTML=fn();
    if(st.step===5)bindDrag();
  }
}

function nav(back){
  return`<div class="nav">
    ${back?`<button class="bbtn" onclick="goStep(${st.step-1})">← Voltar</button>`:`<div></div>`}
    <button class="nbtn" onclick="avancar()">Continuar →</button>
  </div>`;
}

async function doFinalizar(){
  const ta=document.getElementById("ta");
  if(ta)st.comentario=ta.value;

  // Mostra resultado imediatamente
  document.getElementById("prog-fill").style.width="100%";
  document.getElementById("prog-etapa").textContent="Concluído";
  document.getElementById("prog-falta").textContent="✓";
  document.getElementById("app").innerHTML=sRes('<div class="sending-msg">Enviando respostas...</div>');

  // Monta payload
  const faixa=calcFaixa();
  const profItems=Object.entries(st.profund).map(([nid,items])=>{
    const n=PROFUNDIDADE.find(x=>x.id===nid);
    return(n?n.name:"")+": "+items.join(", ");
  }).join(" | ");
  const culturaScore=Object.values(st.cultura).reduce((a,v)=>a+(v==="sim"?2:v==="parcialmente"?1:0),0);
  const culturaTexto=Object.entries(st.cultura).map(([k,v])=>{
    const labels={ferramentas:"Ferramentas licenciadas",politica:"Política clara",treinamento:"Treinamento formal",lideranca:"Incentivo da liderança"};
    return(labels[k]||k)+": "+v;
  }).join(" | ");

  const payload={data:{
    timestamp:new Date().toISOString(),
    nome:st.nome||"Não informado",
    departamento:st.dept||"Não informado",
    autoavaliacao:st.autoaval||"—",
    nivel_uso:st.nivel||"0",
    ferramentas:st.tools.join(", ")||"Nenhuma",
    frequencia:st.freq||"Não informado",
    profundidade:profItems||"Não informado",
    dores_ranking:st.ranking.map((d,i)=>`${i+1}. ${d.t}`).join(" | ")||"Nenhuma",
    barreiras:st.barreiras.join(", ")||"Nenhuma",
    cultura_empresa:culturaTexto||"Não respondido",
    score_cultura:String(culturaScore),
    o_que_precisaria:st.ofertas.join(", ")||"Nenhum",
    visao_livre:st.comentario||"",
    faixa_calculada:faixa.nome||"Faixa Branca — Observador"
  }};

  try{
    const res=await fetch(SHEET_URL,{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(payload)});
    const statusEl=document.getElementById("send-status");
    if(!statusEl)return;
    if(res.ok){
      statusEl.innerHTML='<div class="sent-ok">✓ Respostas enviadas com sucesso ao Conselho Administrativo.</div>';
    }else{
      throw new Error("HTTP "+res.status);
    }
  }catch(e){
    const statusEl=document.getElementById("send-status");
    if(statusEl)statusEl.innerHTML='<div class="sent-err">Erro ao enviar. Entre em contato com o Conselho.</div>';
  }
}

function bindDrag(){
  let dragIdx=null;
  document.querySelectorAll(".rank-row").forEach(row=>{
    row.addEventListener("dragstart",()=>{dragIdx=parseInt(row.dataset.ridx);setTimeout(()=>row.style.opacity=".3",0);});
    row.addEventListener("dragend",()=>{row.style.opacity="1";document.querySelectorAll(".rank-row").forEach(r=>r.classList.remove("drag-over"));});
    row.addEventListener("dragover",e=>{e.preventDefault();document.querySelectorAll(".rank-row").forEach(r=>r.classList.remove("drag-over"));row.classList.add("drag-over");});
    row.addEventListener("drop",e=>{e.preventDefault();const to=parseInt(row.dataset.ridx);if(dragIdx===null||dragIdx===to)return;const m=st.ranking.splice(dragIdx,1)[0];st.ranking.splice(to,0,m);render();});
  });
}

render();
</script>
</body>
</html>
